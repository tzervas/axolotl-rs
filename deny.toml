# cargo-deny configuration
# See https://embarkstudios.github.io/cargo-deny/ for more information

[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unlicense",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "BSL-1.0",
]
confidence-threshold = 0.8

[[licenses.clarify]]
# Gemm crates use dual licensing
name = "gemm"
expression = "MIT OR Apache-2.0"
license-files = []

[[licenses.clarify]]
name = "gemm-c32"
expression = "MIT OR Apache-2.0"
license-files = []

[[licenses.clarify]]
name = "gemm-c64"
expression = "MIT OR Apache-2.0"
license-files = []

[[licenses.clarify]]
name = "gemm-common"
expression = "MIT OR Apache-2.0"
license-files = []

[[licenses.clarify]]
name = "gemm-f16"
expression = "MIT OR Apache-2.0"
license-files = []

[[licenses.clarify]]
name = "gemm-f32"
expression = "MIT OR Apache-2.0"
license-files = []

[[licenses.clarify]]
name = "gemm-f64"
expression = "MIT OR Apache-2.0"
license-files = []

[bans]
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = [
    "https://github.com/tzervas/peft-rs",
    "https://github.com/tzervas/qlora-rs",
    "https://github.com/tzervas/unsloth-rs",
]
